<svg viewBox="0 0 480 360" width="480" height="360" xmlns="http://www.w3.org/2000/svg">
  <!-- Xe cáo lái, thỏ ngồi ghế phụ — nhìn trực diện. Nguồn: car_fox_rabbit.svg của Quang Vinh,
       đã bỏ các vệt chuyển động hai bên để phù hợp khi xe đứng yên trên canvas. -->

  <!-- ===== ground shadow ===== -->
  <ellipse cx="240" cy="338" rx="176" ry="20" fill="#000000" opacity="0.14"/>

  <!-- ===== front wheels ===== -->
  <g>
    <rect x="74" y="280" width="74" height="56" rx="20" fill="#26272C"/>
    <circle cx="111" cy="308" r="17" fill="#C9CDD4"/>
    <circle cx="111" cy="308" r="7" fill="#7E828B"/>
  </g>
  <g>
    <rect x="332" y="280" width="74" height="56" rx="20" fill="#26272C"/>
    <circle cx="369" cy="308" r="17" fill="#C9CDD4"/>
    <circle cx="369" cy="308" r="7" fill="#7E828B"/>
  </g>

  <!-- ===== cowl behind seats (rear of open cabin) ===== -->
  <rect x="150" y="102" width="182" height="58" rx="22" fill="#D2453F"/>

  <!-- ===== seat backs ===== -->
  <rect x="158" y="66" width="66" height="78" rx="20" fill="#C79A6B"/>
  <rect x="176" y="72" width="30" height="66" rx="14" fill="#A67E50"/>
  <g transform="rotate(-16 300 108)">
    <rect x="262" y="70" width="64" height="76" rx="20" fill="#C79A6B"/>
    <rect x="280" y="76" width="30" height="64" rx="14" fill="#A67E50"/>
  </g>

  <!-- ================= FOX (driver) ================= -->
  <g>
    <path d="M164,80 L150,38 L194,70 Z" fill="#F28C3B"/>
    <path d="M167,76 L159,50 L184,70 Z" fill="#C9692A"/>
    <path d="M212,70 L228,40 L216,80 Z" fill="#F28C3B"/>
    <path d="M214,74 L224,52 L216,76 Z" fill="#C9692A"/>
    <rect x="160" y="120" width="56" height="46" rx="18" fill="#F28C3B"/>
    <ellipse cx="188" cy="150" rx="15" ry="20" fill="#FCFBF6"/>
    <ellipse cx="188" cy="98" rx="33" ry="29" fill="#F28C3B"/>
    <ellipse cx="188" cy="108" rx="23" ry="15" fill="#FCFBF6"/>
    <path d="M188,74 L180,96 L196,96 Z" fill="#FCFBF6"/>
    <ellipse cx="176" cy="93" rx="4.5" ry="6" fill="#241F1C"/>
    <ellipse cx="200" cy="93" rx="4.5" ry="6" fill="#241F1C"/>
    <circle cx="177.5" cy="91" r="1.6" fill="#ffffff"/>
    <circle cx="201.5" cy="91" r="1.6" fill="#ffffff"/>
    <ellipse cx="167" cy="106" rx="4.5" ry="3" fill="#F4B3C1" opacity="0.7"/>
    <ellipse cx="209" cy="106" rx="4.5" ry="3" fill="#F4B3C1" opacity="0.7"/>
    <ellipse cx="188" cy="104" rx="5" ry="4" fill="#241F1C"/>
    <path d="M188,108 Q188,116 181,117" stroke="#241F1C" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M188,108 Q188,116 195,117" stroke="#241F1C" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ================= RABBIT (passenger, reclining) ================= -->
  <g transform="rotate(-14 306 110)">
    <g transform="rotate(-10 296 60)">
      <ellipse cx="296" cy="58" rx="9" ry="30" fill="#E9ECF1"/>
      <ellipse cx="296" cy="60" rx="4.2" ry="22" fill="#F4B3C1"/>
    </g>
    <g transform="rotate(40 322 66)">
      <ellipse cx="322" cy="62" rx="8.5" ry="30" fill="#E9ECF1"/>
      <ellipse cx="322" cy="64" rx="4" ry="22" fill="#F4B3C1"/>
    </g>
    <rect x="282" y="112" width="52" height="44" rx="18" fill="#E9ECF1"/>
    <ellipse cx="308" cy="140" rx="14" ry="16" fill="#F4F6F9"/>
    <ellipse cx="307" cy="92" rx="27" ry="24" fill="#E9ECF1"/>
    <rect x="290" y="85" width="15" height="11" rx="5" fill="#22222A"/>
    <rect x="309" y="85" width="15" height="11" rx="5" fill="#22222A"/>
    <rect x="304" y="88" width="6" height="3" fill="#22222A"/>
    <path d="M292,87 L297,87" stroke="#5a5a66" stroke-width="1.6" stroke-linecap="round"/>
    <ellipse cx="290" cy="101" rx="4" ry="3" fill="#F4B3C1" opacity="0.75"/>
    <path d="M307,100 l-4,4 h8 Z" fill="#EE93AC"/>
    <path d="M307,104 q-5,4 -9,2" stroke="#8a8f99" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M307,104 q5,4 9,2" stroke="#8a8f99" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M300,120 C280,112 274,86 292,72" stroke="#E9ECF1" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>

  <!-- rabbit big foot propped up on the door edge -->
  <g transform="rotate(-24 258 150)">
    <ellipse cx="258" cy="150" rx="26" ry="13" fill="#E9ECF1"/>
    <ellipse cx="240" cy="150" rx="7" ry="8" fill="#F4B3C1"/>
    <circle cx="252" cy="145" r="2.6" fill="#F4B3C1"/>
    <circle cx="258" cy="147" r="2.6" fill="#F4B3C1"/>
    <circle cx="264" cy="146" r="2.6" fill="#F4B3C1"/>
  </g>

  <!-- ===== windshield ===== -->
  <path d="M140,196 L340,196 L318,150 L162,150 Z" fill="#C3E5F1" opacity="0.82"/>
  <path d="M140,196 L340,196 L318,150 L162,150 Z" fill="none" stroke="#4E525A" stroke-width="5" stroke-linejoin="round"/>
  <path d="M176,150 L156,196 L184,196 L206,150 Z" fill="#ffffff" opacity="0.18"/>

  <!-- ===== hood ===== -->
  <path d="M118,222 L362,222 L338,196 L142,196 Z" fill="#F26F63"/>
  <line x1="240" y1="196" x2="240" y2="222" stroke="#C7413B" stroke-width="2.5"/>

  <!-- ===== main front body ===== -->
  <rect x="100" y="216" width="280" height="84" rx="24" fill="#E8504A"/>
  <rect x="108" y="220" width="264" height="12" rx="6" fill="#F26F63"/>

  <!-- bumper -->
  <rect x="92" y="288" width="296" height="40" rx="18" fill="#37393F"/>
  <rect x="100" y="300" width="280" height="8" rx="4" fill="#C9CDD4"/>

  <!-- headlights -->
  <g>
    <rect x="118" y="242" width="56" height="30" rx="14" fill="#FFF0B8" stroke="#E9C778" stroke-width="3"/>
    <ellipse cx="134" cy="252" rx="8" ry="5" fill="#ffffff" opacity="0.8"/>
  </g>
  <g>
    <rect x="306" y="242" width="56" height="30" rx="14" fill="#FFF0B8" stroke="#E9C778" stroke-width="3"/>
    <ellipse cx="322" cy="252" rx="8" ry="5" fill="#ffffff" opacity="0.8"/>
  </g>

  <!-- grille -->
  <rect x="204" y="248" width="72" height="46" rx="9" fill="#212227"/>
  <line x1="218" y1="252" x2="218" y2="290" stroke="#4a4c53" stroke-width="3"/>
  <line x1="240" y1="252" x2="240" y2="290" stroke="#4a4c53" stroke-width="3"/>
  <line x1="262" y1="252" x2="262" y2="290" stroke="#4a4c53" stroke-width="3"/>
  <circle cx="240" cy="236" r="10" fill="#C9CDD4"/>
  <circle cx="240" cy="236" r="5" fill="#E8504A"/>

  <!-- license plate -->
  <rect x="214" y="300" width="52" height="18" rx="3" fill="#F2E9C0" stroke="#B9A96A" stroke-width="2"/>
  <line x1="222" y1="309" x2="258" y2="309" stroke="#8a7d4a" stroke-width="2"/>

  <!-- side mirrors -->
  <ellipse cx="126" cy="200" rx="10" ry="7" fill="#E8504A" stroke="#C7413B" stroke-width="2"/>
  <ellipse cx="354" cy="200" rx="10" ry="7" fill="#E8504A" stroke="#C7413B" stroke-width="2"/>

  <!-- ===== steering wheel + fox paws ===== -->
  <circle cx="188" cy="150" r="20" fill="none" stroke="#2E2E33" stroke-width="8"/>
  <circle cx="188" cy="150" r="6" fill="#2E2E33"/>
  <line x1="188" y1="150" x2="170" y2="150" stroke="#2E2E33" stroke-width="4"/>
  <line x1="188" y1="150" x2="206" y2="150" stroke="#2E2E33" stroke-width="4"/>
  <ellipse cx="170" cy="149" rx="8" ry="6.5" fill="#F28C3B"/>
  <ellipse cx="206" cy="149" rx="8" ry="6.5" fill="#F28C3B"/>
</svg>
