<svg viewBox="0 0 480 360" width="480" height="360" xmlns="http://www.w3.org/2000/svg">
  <!-- Đuôi xe (nhìn từ phía sau) — phái sinh từ car.svg: cáo và thỏ quay lưng lại,
       đèn hậu đỏ thay đèn pha. Hiển thị khi xe chạy TỚI (đi xa khỏi người xem). -->

  <!-- ===== ground shadow ===== -->
  <ellipse cx="240" cy="338" rx="176" ry="20" fill="#000000" opacity="0.14"/>

  <!-- ===== rear wheels ===== -->
  <g>
    <rect x="74" y="280" width="74" height="56" rx="20" fill="#26272C"/>
    <circle cx="111" cy="308" r="17" fill="#C9CDD4"/>
    <circle cx="111" cy="308" r="7" fill="#7E828B"/>
  </g>
  <g>
    <rect x="332" y="280" width="74" height="56" rx="20" fill="#26272C"/>
    <circle cx="369" cy="308" r="17" fill="#C9CDD4"/>
    <circle cx="369" cy="308" r="7" fill="#7E828B"/>
  </g>

  <!-- ================= FOX (driver) — quay lưng ================= -->
  <g>
    <!-- tai -->
    <path d="M164,80 L150,38 L194,70 Z" fill="#F28C3B"/>
    <path d="M212,70 L228,40 L216,80 Z" fill="#F28C3B"/>
    <!-- đầu (sau gáy — không có mặt) -->
    <ellipse cx="188" cy="98" rx="33" ry="29" fill="#F28C3B"/>
    <path d="M188,70 Q170,86 172,104 Q188,96 204,104 Q206,86 188,70 Z" fill="#E07B2E" opacity="0.55"/>
    <!-- lưng -->
    <rect x="158" y="118" width="60" height="52" rx="20" fill="#F28C3B"/>
    <rect x="170" y="124" width="36" height="44" rx="14" fill="#E07B2E" opacity="0.5"/>
  </g>

  <!-- ================= RABBIT (passenger) — quay lưng, vẫn ngả ghế ================= -->
  <g transform="rotate(-14 306 110)">
    <!-- tai -->
    <g transform="rotate(-10 296 60)">
      <ellipse cx="296" cy="58" rx="9" ry="30" fill="#E9ECF1"/>
    </g>
    <g transform="rotate(40 322 66)">
      <ellipse cx="322" cy="62" rx="8.5" ry="30" fill="#E9ECF1"/>
    </g>
    <!-- đầu (sau gáy) -->
    <ellipse cx="307" cy="92" rx="27" ry="24" fill="#E9ECF1"/>
    <ellipse cx="307" cy="96" rx="16" ry="14" fill="#DDE2EA" opacity="0.6"/>
    <!-- lưng + đuôi bông -->
    <rect x="280" y="112" width="56" height="48" rx="18" fill="#E9ECF1"/>
    <circle cx="308" cy="152" r="9" fill="#F4F6F9"/>
    <!-- tay vắt sau đầu (thư giãn) -->
    <path d="M300,120 C280,112 274,86 292,72" stroke="#E9ECF1" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ===== ghế (thanh tựa nhô hai bên vai) ===== -->
  <path d="M152,96 q-8,40 4,74 l14,0 q-10,-38 -2,-74 Z" fill="#C79A6B"/>
  <path d="M232,96 q8,40 -4,74 l-14,0 q10,-38 2,-74 Z" fill="#C79A6B"/>
  <g transform="rotate(-16 300 108)">
    <path d="M256,98 q-8,38 4,70 l14,0 q-10,-36 -2,-70 Z" fill="#C79A6B"/>
    <path d="M336,98 q8,38 -4,70 l-14,0 q10,-36 2,-70 Z" fill="#C79A6B"/>
  </g>

  <!-- ===== rear deck (mui sau, che phần thân dưới của hai bạn) ===== -->
  <rect x="140" y="168" width="200" height="56" rx="22" fill="#D2453F"/>
  <line x1="240" y1="176" x2="240" y2="218" stroke="#C7413B" stroke-width="2.5"/>

  <!-- ===== main rear body ===== -->
  <rect x="100" y="216" width="280" height="84" rx="24" fill="#E8504A"/>
  <rect x="108" y="220" width="264" height="12" rx="6" fill="#F26F63"/>

  <!-- bumper -->
  <rect x="92" y="288" width="296" height="40" rx="18" fill="#37393F"/>
  <rect x="100" y="300" width="280" height="8" rx="4" fill="#C9CDD4"/>

  <!-- taillights (đèn hậu đỏ) -->
  <g>
    <rect x="118" y="242" width="56" height="30" rx="14" fill="#FF6B5E" stroke="#C0392B" stroke-width="3"/>
    <ellipse cx="134" cy="252" rx="8" ry="5" fill="#ffffff" opacity="0.55"/>
  </g>
  <g>
    <rect x="306" y="242" width="56" height="30" rx="14" fill="#FF6B5E" stroke="#C0392B" stroke-width="3"/>
    <ellipse cx="322" cy="252" rx="8" ry="5" fill="#ffffff" opacity="0.55"/>
  </g>

  <!-- nắp cốp + logo -->
  <rect x="204" y="248" width="72" height="40" rx="9" fill="#D2453F"/>
  <circle cx="240" cy="268" r="10" fill="#C9CDD4"/>
  <circle cx="240" cy="268" r="5" fill="#E8504A"/>

  <!-- license plate -->
  <rect x="214" y="300" width="52" height="18" rx="3" fill="#F2E9C0" stroke="#B9A96A" stroke-width="2"/>
  <line x1="222" y1="309" x2="258" y2="309" stroke="#8a7d4a" stroke-width="2"/>

  <!-- side mirrors -->
  <ellipse cx="126" cy="200" rx="10" ry="7" fill="#E8504A" stroke="#C7413B" stroke-width="2"/>
  <ellipse cx="354" cy="200" rx="10" ry="7" fill="#E8504A" stroke="#C7413B" stroke-width="2"/>
</svg>
